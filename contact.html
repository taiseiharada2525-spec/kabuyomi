<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ｜カブヨミ</title>
  <meta name="description" content="カブヨミへのお問い合わせはこちらから。バグ報告・ご意見・ご要望をお待ちしています。" />
  <link rel="icon" type="image/png" href="icons/favicon-32.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #0e1116; color: #e8e8f0; line-height: 1.8; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    header a { color: #a78bfa; text-decoration: none; font-size: 14px; }
    header span { color: #888; font-size: 14px; }
    .container { max-width: 600px; margin: 0 auto; padding: 32px 20px 60px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #888; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #a78bfa; margin-bottom: 6px; }
    input, textarea, select { width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 14px; color: #e8e8f0; font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
    input:focus, textarea:focus, select:focus { border-color: #7c3aed; }
    textarea { resize: vertical; min-height: 120px; }
    .btn { width: 100%; background: #7c3aed; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn:hover { background: #6d28d9; }
    .note { font-size: 12px; color: #666; margin-top: 16px; text-align: center; }
    a { color: #a78bfa; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← カブヨミ TOP</a>
    <span>/</span>
    <span>お問い合わせ</span>
  </header>
  <div class="container">
    <h1>お問い合わせ</h1>
    <p class="sub">バグ報告・機能要望・その他ご意見をお気軽にどうぞ。</p>

    <form action="https://formspree.io/f/placeholder" method="POST">
      <div class="form-group">
        <label for="category">お問い合わせ種別</label>
        <select id="category" name="category">
          <option value="bug">バグ・不具合報告</option>
          <option value="feature">機能要望</option>
          <option value="content">ニュース・銘柄に関するご意見</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="email">メールアドレス（返信が必要な場合）</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label for="message">お問い合わせ内容 <span style="color:#f87171">*</span></label>
        <textarea id="message" name="message" placeholder="ご意見・ご要望をご記入ください" required></textarea>
      </div>
      <button type="submit" class="btn">送信する</button>
    </form>
    <p class="note">
      <a href="privacy.html">プライバシーポリシー</a> ・ <a href="disclaimer.html">免責事項</a>
    </p>
  </div>
</body>
</html>
